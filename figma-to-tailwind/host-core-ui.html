<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>长鑫项目 - Host Core UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
    </style>
</head>
<body class="bg-white min-h-screen">
    <!-- Title Bar -->
    <header class="w-full h-12 flex items-center justify-between px-4 border-b border-black/5">
        <!-- Left: Search -->
        <div class="flex items-center">
            <!-- Search Input -->
            <div class="flex items-center gap-2 w-40 h-7 px-2 py-1 bg-[#DDE8EB] rounded-2xl">
                <!-- Search Icon -->
                <div class="w-5 h-5 flex items-center justify-center">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="10" cy="10" r="10" fill="#01C59D"/>
                        <path d="M10.5726 9.62167L8.48457 7.53362C10.0431 5.44946 9.6162 2.49712 7.53334 0.938545C5.45048 -0.620031 2.49684 -0.193077 0.93826 1.88978C0.329624 2.70476 0 3.69363 0 4.71105C0 7.31301 2.10882 9.42312 4.71207 9.42312C5.72949 9.42312 6.71836 9.09349 7.53334 8.48486L9.62009 10.5716C9.88223 10.8351 10.3092 10.8351 10.5726 10.5729C10.8348 10.3108 10.8348 9.88381 10.5726 9.62167ZM4.71077 8.07737C2.85242 8.10332 1.32498 6.61872 1.29773 4.76037C1.27178 2.90201 2.75638 1.37458 4.61474 1.34733L4.70947 1.34733C6.56782 1.34733 8.07449 2.854 8.07449 4.71235C8.07449 6.5707 6.57042 8.07737 4.71077 8.07737Z" fill="white"/>
                    </svg>
                </div>
                <!-- Search Text -->
                <span class="text-sm text-black/20 font-normal">Search</span>
            </div>
        </div>

        <!-- Right: Controls -->
        <div class="flex items-center gap-4">
            <!-- Group Tags -->
            <div class="flex items-center gap-2">
                <!-- Group 1 -->
                <div class="flex items-center justify-center h-[30px] px-6 bg-[#E6F0FF] rounded-2xl">
                    <span class="text-sm font-medium text-[#055CB9]">Group 1</span>
                </div>
                <!-- Group 2 -->
                <div class="flex items-center justify-center h-[30px] px-6 bg-[#E6F0FF] rounded-2xl">
                    <span class="text-sm font-medium text-[#055CB9]">Group 2</span>
                </div>
                <!-- Add Group -->
                <div class="flex items-center justify-center h-[30px] px-2 bg-[#E6F0FF] rounded-2xl gap-2 cursor-pointer hover:bg-[#D6E8FF] transition-colors">
                    <!-- Plus Icon -->
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M8.33333 16.6667C3.73104 16.6667 0 12.9356 0 8.33333C0 3.73104 3.73104 0 8.33333 0C12.9356 0 16.6667 3.73104 16.6667 8.33333C16.6667 12.9356 12.9356 16.6667 8.33333 16.6667ZM8.33333 15.4167C12.2454 15.4167 15.4167 12.2454 15.4167 8.33333C15.4167 4.42125 12.2454 1.25 8.33333 1.25C4.42125 1.25 1.25 4.42125 1.25 8.33333C1.25 12.2454 4.42125 15.4167 8.33333 15.4167ZM8.95833 7.70833L11.4583 7.70833C11.6241 7.70833 11.7831 7.77418 11.9003 7.89139C12.0175 8.0086 12.0833 8.16757 12.0833 8.33333C12.0833 8.49909 12.0175 8.65806 11.9003 8.77528C11.7831 8.89249 11.6241 8.95833 11.4583 8.95833L8.95833 8.95833L8.95833 11.4583C8.95833 11.6241 8.89249 11.7831 8.77528 11.9003C8.65806 12.0175 8.49909 12.0833 8.33333 12.0833C8.16757 12.0833 8.0086 12.0175 7.89139 11.9003C7.77418 11.7831 7.70833 11.6241 7.70833 11.4583L7.70833 8.95833L5.20833 8.95833C5.04257 8.95833 4.8836 8.89249 4.76639 8.77528C4.64918 8.65806 4.58333 8.49909 4.58333 8.33333C4.58333 8.16757 4.64918 8.0086 4.76639 7.89139C4.8836 7.77418 5.04257 7.70833 5.20833 7.70833L7.70833 7.70833L7.70833 5.20833C7.70833 5.04257 7.77418 4.8836 7.89139 4.76639C8.0086 4.64918 8.16757 4.58333 8.33333 4.58333C8.49909 4.58333 8.65806 4.64918 8.77528 4.76639C8.89249 4.8836 8.95833 5.04257 8.95833 5.20833L8.95833 7.70833Z" fill="#055CB9"/>
                    </svg>
                    <span class="text-sm font-medium text-[#055CB9]">Group</span>
                </div>
            </div>

            <!-- Right Controls -->
            <div class="flex items-center gap-3">
                <!-- Notification Bell -->
                <div class="w-6 h-6 flex items-center justify-center cursor-pointer hover:bg-gray-100 rounded-full transition-colors relative">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <!-- Bell Fill (Duotone style) -->

                        <path d="M14.8272 11.8703C14.3936 11.1234 13.7491 9.01016 13.7491 6.25C13.7491 4.5924 13.0906 3.00269 11.9185 1.83058C10.7464 0.65848 9.1567 5.55112e-16 7.49909 0C5.84149 8.32667e-16 4.25178 0.65848 3.07968 1.83058C1.90757 3.00269 1.24909 4.5924 1.24909 6.25C1.24909 9.01094 0.603782 11.1234 0.170188 11.8703C0.0594621 12.0602 0.000761949 12.2759 7.36794e-06 12.4957C-0.000747213 12.7155 0.0564706 12.9316 0.16589 13.1223C0.27531 13.3129 0.433063 13.4713 0.623239 13.5815C0.813416 13.6917 1.02929 13.7498 1.24909 13.75L4.43738 13.75C4.58157 14.4556 4.96505 15.0897 5.52295 15.5451C6.08085 16.0006 6.77892 16.2493 7.49909 16.2493C8.21927 16.2493 8.91734 16.0006 9.47524 15.5451C10.0331 15.0897 10.4166 14.4556 10.5608 13.75L13.7491 13.75C13.9688 13.7497 14.1846 13.6915 14.3747 13.5812C14.5647 13.471 14.7224 13.3125 14.8317 13.1219C14.941 12.9313 14.9982 12.7153 14.9974 12.4955C14.9966 12.2758 14.9379 12.0601 14.8272 11.8703ZM7.49909 15C7.11145 14.9999 6.73338 14.8796 6.41691 14.6558C6.10043 14.4319 5.86112 14.1155 5.73191 13.75L9.26628 13.75C9.13707 14.1155 8.89776 14.4319 8.58128 14.6558C8.26481 14.8796 7.88674 14.9999 7.49909 15ZM1.24909 12.5C1.85066 11.4656 2.49909 9.06875 2.49909 6.25C2.49909 4.92392 3.02588 3.65215 3.96356 2.71447C4.90124 1.77678 6.17301 1.25 7.49909 1.25C8.82518 1.25 10.0969 1.77678 11.0346 2.71447C11.9723 3.65215 12.4991 4.92392 12.4991 6.25C12.4991 9.06641 13.146 11.4633 13.7491 12.5L1.24909 12.5Z" fill="#1A1A1A"/>
                    </svg>
                    <!-- Badge -->
                    <span class="absolute -top-0.5 -right-0.5 w-2 h-2 bg-[#FC465C] rounded-full"></span>
                </div>

                <!-- Message Icon -->
                <div class="w-6 h-6 flex items-center justify-center cursor-pointer hover:bg-gray-100 rounded-full transition-colors">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <!-- Chat bubble fill -->
                        <path d="M7.5 15C11.6421 15 15 11.6421 15 7.5C15 3.35786 11.6421 0 7.5 0C3.35786 0 0 3.35786 0 7.5C0 8.88071 0.358612 10.1785 0.984662 11.2976C1.2246 11.7233 1.5625 12.0834 1.97916 12.0834L3.75 12.0834C4.21024 12.0834 4.58334 12.4564 4.58334 12.9166C4.58334 13.3769 4.21024 13.75 3.75 13.75L7.5 13.75L7.5 15Z" fill="#EBF6FD"/>
                        <!-- Chat bubble outline -->

                        <!-- Three dots -->
                        <circle cx="5" cy="7.5" r="1.25" fill="#1A1A1A"/>
                        <circle cx="7.5" cy="7.5" r="1.25" fill="#1A1A1A"/>
                        <circle cx="10" cy="7.5" r="1.25" fill="#1A1A1A"/>
                    </svg>
                </div>

                <!-- Language Selector -->
                <div class="flex items-center gap-1 px-1 py-0.5 bg-[#E6F0FF] rounded cursor-pointer hover:bg-[#D6E8FF] transition-colors">
                    <!-- Globe Icon -->
                    <div class="w-6 h-6 flex items-center justify-center">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="12" cy="12" r="10" stroke="#1A1A1A" stroke-width="1.5" fill="none"/>
                            <path d="M12 2C14.5 5.5 15.5 8.5 15.5 12C15.5 15.5 14.5 18.5 12 22" stroke="#1A1A1A" stroke-width="1.5" fill="none"/>
                            <path d="M12 2C9.5 5.5 8.5 8.5 8.5 12C8.5 15.5 9.5 18.5 12 22" stroke="#1A1A1A" stroke-width="1.5" fill="none"/>
                            <path d="M2 12H22" stroke="#1A1A1A" stroke-width="1.5"/>
                            <path d="M3 7H21" stroke="#1A1A1A" stroke-width="1.5"/>
                            <path d="M3 17H21" stroke="#1A1A1A" stroke-width="1.5"/>
                        </svg>
                    </div>
                    <!-- English Text -->
                    <span class="text-xs text-[#223548] font-normal">English</span>
                    <!-- Dropdown Arrow -->
                    <div class="w-4 h-4 flex items-center justify-center opacity-50">
                        <svg width="8" height="4" viewBox="0 0 8 4" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M0 0L4 4L8 0" stroke="#71718A" stroke-width="1.33" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                </div>

                <!-- Admin User -->
                <div class="flex items-center gap-2 cursor-pointer hover:bg-gray-50 rounded-full px-1 py-1 transition-colors">
                    <!-- User Avatar -->
                    <div class="w-6 h-6 rounded-xl bg-gray-100 flex items-center justify-center overflow-hidden">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle opacity="0.08" cx="8" cy="8" r="5.6" fill="#055CB9"/>
                            <circle cx="8" cy="8" r="5.6" stroke="#1A1A1A" stroke-width="1"/>
                            <path d="M5 13.5L8 8L11 13.5" stroke="#1A1A1A" stroke-width="1" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <!-- Username -->
                    <span class="text-xs font-medium text-black">admin</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content Placeholder -->
    <main class="p-6">
        <div class="max-w-7xl mx-auto">
            <div class="bg-gray-50 rounded-lg p-8 text-center text-gray-400">
                <p>Main Content Area</p>
            </div>
        </div>
    </main>
</body>
</html>
